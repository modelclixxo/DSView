name: Build and Release

on:
  push:
    branches:
      - master
      - ubuntu25.10-wayland
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            artifact_name: dsview-linux-x86_64
            archive_name: linux-x86_64
          - name: Windows
            os: windows-2022
            artifact_name: dsview-windows-x86_64
            archive_name: windows-x86_64
          - name: macOS
            os: macos-13
            artifact_name: dsview-macos-x86_64
            archive_name: macos-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute build metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="sha-${GITHUB_SHA::7}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            qt6-base-dev qt6-tools-dev qt6-wayland \
            libglib2.0-dev libfftw3-dev libusb-1.0-0-dev \
            libboost-dev zlib1g-dev python3-dev

      - name: Set up MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-python
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-qt6-base

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install cmake ninja pkg-config qt@6 glib libusb fftw boost python@3.12

      - name: Configure Linux
        if: runner.os == 'Linux'
        shell: bash
        run: cmake -S . -B build -G Ninja -DDSVIEW_PREFER_QT6=ON

      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake -S . -B build -G Ninja -DDSVIEW_PREFER_QT6=ON

      - name: Configure macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          export PATH="$(brew --prefix qt@6)/bin:$PATH"
          cmake -S . -B build -G Ninja -DDSVIEW_PREFER_QT6=ON -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)"

      - name: Build Linux
        if: runner.os == 'Linux'
        shell: bash
        run: cmake --build build --parallel

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Build macOS
        if: runner.os == 'macOS'
        shell: bash
        run: cmake --build build --parallel

      - name: Smoke check Linux
        if: runner.os == 'Linux'
        shell: bash
        run: ./build.dir/DSView -v

      - name: Smoke check Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ./build.dir/DSView.exe -v

      - name: Smoke check macOS
        if: runner.os == 'macOS'
        shell: bash
        run: ./build.dir/DSView.app/Contents/MacOS/DSView -v

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          stage="${RUNNER_TEMP}/stage"
          mkdir -p "${stage}" dist
          cmake --install build --prefix "${stage}/usr"
          tar -C "${stage}" -czf "dist/DSView-${version}-${{ matrix.archive_name }}.tar.gz" usr
          cpack --config build/CPackConfig.cmake -G DEB -B dist

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          stage="${RUNNER_TEMP}/stage"
          package_root="${RUNNER_TEMP}/DSView-${version}-${{ matrix.archive_name }}"
          mkdir -p "${stage}" "${package_root}" dist
          cmake --install build --prefix "${stage}"
          cp -R "${stage}/bin/." "${package_root}/"
          cp -R "${stage}/share/DSView/." "${package_root}/"
          mkdir -p "${package_root}/decoders"
          cp -R "${stage}/share/libsigrokdecode4DSL/decoders/." "${package_root}/decoders/"

          deployqt="$(command -v windeployqt6.exe || command -v windeployqt.exe || command -v windeployqt6 || command -v windeployqt)"
          "${deployqt}" --release --compiler-runtime "${package_root}/DSView.exe"

          for dep in $(ldd "${package_root}/DSView.exe" | awk '/=> \\/mingw64\\// {print $3}'); do
            cp -n "${dep}" "${package_root}/"
          done

          7z a "dist/DSView-${version}-${{ matrix.archive_name }}.zip" "${package_root}" >/dev/null

      - name: Package macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          stage="${RUNNER_TEMP}/stage"
          app_path="${stage}/DSView.app"
          mkdir -p "${stage}" dist
          export PATH="$(brew --prefix qt@6)/bin:$PATH"

          cmake --install build --prefix "${stage}"
          mkdir -p "${app_path}/Contents/share"
          cp -R "${stage}/share/DSView" "${app_path}/Contents/share/DSView"
          cp -R "${stage}/share/libsigrokdecode4DSL" "${app_path}/Contents/share/libsigrokdecode4DSL"

          macdeployqt "${app_path}" -dmg
          ditto -c -k --sequesterRsrc --keepParent "${app_path}" "dist/DSView-${version}-${{ matrix.archive_name }}.zip"
          mv "${stage}/DSView.dmg" "dist/DSView-${version}-${{ matrix.archive_name }}.dmg"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    needs:
      - build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --title "${tag}" --generate-notes
          fi
          mapfile -d '' files < <(find release-artifacts -type f -print0)
          gh release upload "${tag}" "${files[@]}" --clobber
